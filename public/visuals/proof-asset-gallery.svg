<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">David Ortiz proof asset gallery</title>
  <desc id="desc">A gallery-style map showing the relationship between HighEncode, CSBrainAI, Prompt Defenders, and the personal hub.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#E7EEF4"/>
    </linearGradient>
    <filter id="shadow" x="54" y="62" width="1292" height="684" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="820" rx="40" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="86" y="86" width="1228" height="648" rx="34" fill="#FCFBF8"/>
  </g>
  <text x="138" y="158" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">Proof assets, not one blurred brand</text>
  <text x="138" y="198" fill="#596575" font-family="Inter, Arial, sans-serif" font-size="18">Each surface has a job. The personal site routes people without forcing every project into HighEncode.</text>

  <rect x="138" y="268" width="264" height="274" rx="26" fill="#13231D"/>
  <text x="174" y="322" fill="#E9FBF2" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">HighEncode</text>
  <text x="174" y="360" fill="#B9D4C6" font-family="Inter, Arial, sans-serif" font-size="16">Client-facing work</text>
  <rect x="174" y="408" width="158" height="14" rx="7" fill="#4ADE80"/>
  <rect x="174" y="442" width="108" height="14" rx="7" fill="#93C5FD"/>
  <text x="174" y="502" fill="#E9FBF2" font-family="Inter, Arial, sans-serif" font-size="16">Local websites</text>
  <text x="174" y="530" fill="#E9FBF2" font-family="Inter, Arial, sans-serif" font-size="16">Lead flow and handoff</text>

  <rect x="438" y="268" width="264" height="274" rx="26" fill="#F8FAFC" stroke="#D8E0EA" stroke-width="2"/>
  <text x="474" y="322" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">CSBrainAI</text>
  <text x="474" y="360" fill="#596575" font-family="Inter, Arial, sans-serif" font-size="16">RAG proof asset</text>
  <circle cx="500" cy="432" r="22" fill="#20C7B6"/>
  <circle cx="558" cy="432" r="22" fill="#F2A93B"/>
  <circle cx="616" cy="432" r="22" fill="#C2413A"/>
  <text x="474" y="502" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="16">Cited answers</text>
  <text x="474" y="530" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="16">Hash-only telemetry</text>

  <rect x="738" y="268" width="264" height="274" rx="26" fill="#07111D"/>
  <text x="774" y="322" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">Prompt Defenders</text>
  <text x="774" y="360" fill="#B7C8DA" font-family="Inter, Arial, sans-serif" font-size="16">AI-security lane</text>
  <path d="M824 420L872 392L920 420V478L872 506L824 478V420Z" fill="#0EA5E9" opacity="0.26" stroke="#7DD3FC" stroke-width="3"/>
  <text x="774" y="502" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="16">Prompt risk scoring</text>
  <text x="774" y="530" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="16">Advisory evidence</text>

  <rect x="1038" y="268" width="208" height="274" rx="26" fill="#FFF8E8" stroke="#E8D3A4" stroke-width="2"/>
  <text x="1070" y="322" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850">davidtiz.com</text>
  <text x="1070" y="360" fill="#6F5A2E" font-family="Inter, Arial, sans-serif" font-size="16">Routing hub</text>
  <path d="M1114 424H1176M1114 456H1210M1114 488H1188" stroke="#C084FC" stroke-width="14" stroke-linecap="round"/>
  <text x="1070" y="530" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="16">Context before links</text>

  <g stroke="#8B98A8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M402 406H430"/>
    <path d="M422 396L432 406L422 416"/>
    <path d="M702 406H730"/>
    <path d="M722 396L732 406L722 416"/>
    <path d="M1002 406H1030"/>
    <path d="M1022 396L1032 406L1022 416"/>
  </g>

  <rect x="138" y="604" width="1108" height="74" rx="20" fill="#EDF3F8"/>
  <text x="170" y="648" fill="#3D4A59" font-family="Inter, Arial, sans-serif" font-size="17">Shared deployment layer: Vercel deploys, Doppler secrets, Supabase data, Upstash rate limits, OpenRouter/OpenAI model paths.</text>
</svg>
